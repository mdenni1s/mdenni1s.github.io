<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin GPS</title>
  <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="logo">
    <img src="assets/logo.png" alt="logo" width="50%">
  </div>
  <div class="user">
    <label id="lbusername">username</label>
  </div>
</div>

<!-- NAVIGATION -->
<header class="header">
  <button class="menu-toggle">☰</button>
  <nav class="nav">
    <a href="dashboard.html">Dashboard</a>
    <a href="courses.html">Courses</a>
    <a href="students.html">Students</a>
    <a href="admins.html">Admins</a>
     <a href="gps.html">Gps</a>
    <a href="reports.html">Reports</a>
    <a href="#" onclick="logout()">Logout</a>

  </nav>
</header>

<!-- MAIN -->
<main class="container">

  <!-- Cards -->
  <div class="cards-grid">
    <div class="card"><h3>Active</h3><p class="stat-number">350</p></div>
    <div class="card"><h3>Past</h3><p class="stat-number">25</p></div>
  </div>

  <!-- Table -->
  <div class="card">
    <h2>Active GPS</h2>
    <div class="table-wrapper">
      <table>
        <thead>
          <tr><th>ID</th><th>Name</th><th>Program</th><th>Status</th></tr>
        </thead>
        <tbody>
          <tr><td>2026001</td><td>John Doe</td><td>IT</td><td>Active</td></tr>
          <tr><td>2026002</td><td>Jane Smith</td><td>CS</td><td>Active</td></tr>
          <tr><td>2026003</td><td>Michael Brown</td><td>SE</td><td>Suspended</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Form -->
  <div class="card">
    <h2>Add new GPS</h2>
    <form>
      <div class="form-group">
        <label>Location name </label>
        <input type="text" placeholder="Enter full name">
      </div>
      <div class="form-group">
        <label>Location code</label>
        <input type="text" placeholder="Enter program">
      </div>
      <div class="form-group">
        <label>Status</label>
        <select><option>Active</option>
          <option>Suspended</option>
        </select>
      </div>
       <div class="form-group">
        <label>Longitude</label>
        <input type="text" placeholder="Enter program">
      </div>
      <div class="form-group">
        <label>Latitude</label>
        <input type="text" placeholder="Enter program">
      </div>
      <button type="submit" class="btn-primary">Add New GPS</button>
    </form>
  </div>

</main>

<!-- FOOTER -->
<footer class="footer">
  <p>© 2026 Attendance Admin Panel</p>
</footer>
<script src="https://www.gstatic.com/firebasejs/8.2.5/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/7.16.0/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.2.5/firebase-auth.js"></script>
<script src="js/config.js"></script>

<script>
  const menuToggle = document.querySelector('.menu-toggle');
  const nav = document.querySelector('.nav');
  menuToggle.addEventListener('click', () => {
    nav.classList.toggle('active');
    menuToggle.textContent = nav.classList.contains('active') ? "✖" : "☰";
  });

let lbusername =document.getElementById('lbusername')
auth.onAuthStateChanged(function(user){
  if (user){
    lbusername.innerHTML= user.email
  }else{
    window.location.href="index.html"
  }
})
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Courses</title>
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/form.css">
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="logo">
    <img src="assets/logo.png" alt="logo" width="50%">
  </div>
  <div class="user">
    <label id="lbusername">username</label>
  </div>
</div>

<!-- NAVIGATION -->
<header class="header">
  <button class="menu-toggle">☰</button>
  <nav class="nav">
    <a href="dashboard.html">Dashboard</a>
    <a href="#">Courses</a>
    <a href="students.html">Students</a>
    <a href="admins.html">Admins</a>
     <a href="gps.html">Gps</a>
    <a href="reports.html">Reports</a>
    <a href="#" onclick="logout()">Logout</a>
 </nav>
</header>

<!-- MAIN -->
<main class="container">

  <!-- Cards -->
  <div class="cards-grid">
    <div class="card"><h3>Courses</h3><p class="stat-number">350</p></div>
    <div class="card"><h3>Active</h3><p class="stat-number">25</p></div>
    <div class="card"><h3>Past</h3><p class="stat-number">18</p></div>
    <div class="card"><h3>In session</h3><p class="stat-number">7</p></div>
  </div>


 <!-- Form -->
  <div class="card">
    <h2>Add course</h2>
    
      <div class="form-group">
        <label>Course Name</label>
        <input type="text" placeholder="Enter course name" id="txtcoursename">
      </div>
       <div class="form-group">
        <label>Course Code</label>
        <input type="text" placeholder="Enter code" id="txtcoursecode">
      </div>
      <div class="form-group">
        <label>Add Lecturer</label>
       <select id="lecturerSelect">
        <option> Loading... </option>
      </select>
      </div>
       <div class="form-group">
        <label>Venue GPS</label>
        <select id="venueSelect">
        <option>Loading...</option>
      </select>
      </div>
       <div class="form-group">
        <label>Course Status</label>
        <select id="statusSelect">
          <option>active</option>
        <option>inactive</option>
      </select>
      </div>

        <button class="btn-primary btngreen" id="btnaddcourse">Add Course</button>
    
  </div>


    <!-- Table -->
  <div class="card">
    <h2>Active courses</h2>
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>Course ID</th>
            <th>Course name</th>
            <th>Venue</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>###</td>
            <td>###</td>
            <td>###</td>
            <td>
            <button class="btn btngreen">Open Session</button>
            <button class="btn btnred">Close course</button>
            <button class="btn btnblue">View attendance</button>
          </td>
        </tr>
          
        </tbody>
      </table>
    </div>
  </div>

</main>

<!-- FOOTER -->
<footer class="footer">
  <p>© 2026 Attendance Admin Panel</p>
</footer>
<script src="https://www.gstatic.com/firebasejs/8.2.5/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/7.16.0/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.2.5/firebase-auth.js"></script>
<script src="js/config.js"></script>
<script src="js/courses.js"></script>
<script>
  const menuToggle = document.querySelector('.menu-toggle');
  const nav = document.querySelector('.nav');
  menuToggle.addEventListener('click', () => {
    nav.classList.toggle('active');
    menuToggle.textContent = nav.classList.contains('active') ? "✖" : "☰";
  });

let lbusername =document.getElementById('lbusername')
auth.onAuthStateChanged(function(user){
  if (user){
    lbusername.innerHTML= user.email
  }else{
    window.location.href="index.html"
  }
})



</script>

</body>
</html>
